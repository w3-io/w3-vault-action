kind: integration
partner: w3
name: W3 Vault
version: 1.0.0
repo: w3-io/w3-vault-action
commands:
  - name: deposit
    description: >
      Deposit USDC into a W3 Yelay vault.
    inputs:
      amount:
        type: string
        required: true
        description: 'USDC amount (e.g. "1000.00")'
      environment:
        type: string
        required: false
        description: "Vault environment: testing (default) or production"
      receiver:
        type: string
        required: false
        description: "Receiver address override"
      rpc-url:
        type: string
        required: false
        description: "RPC endpoint URL override"
    outputs:
      result:
        type: object
        description: "{amountFormatted, vault, txHash}"

  - name: redeem
    description: >
      Redeem shares from a W3 Yelay vault for USDC.
    inputs:
      shares:
        type: string
        required: true
        description: "Number of vault shares to redeem"
      environment:
        type: string
        required: false
        description: "Vault environment: testing (default) or production"
      receiver:
        type: string
        required: false
        description: "Receiver address override"
      rpc-url:
        type: string
        required: false
        description: "RPC endpoint URL override"
    outputs:
      result:
        type: object
        description: "Redemption result object"

  - name: status
    description: >
      Get vault status including USDC balance and shares.
    inputs:
      environment:
        type: string
        required: false
        description: "Vault environment: testing (default) or production"
      address:
        type: string
        required: false
        description: "Address to query status for"
      rpc-url:
        type: string
        required: false
        description: "RPC endpoint URL override"
    outputs:
      result:
        type: object
        description: "{usdcBalance, shares}"
