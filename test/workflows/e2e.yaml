# E2E Test Workflow
# Recovery: all write tests round-trip to recover funds. Only gas is consumed.
#
# Exercises every command against real APIs/contracts.
# Run on a local W3 network with:
#   w3 workflow deploy test/workflows/e2e.yaml
#   w3 workflow "Vault E2E" trigger
#
# Prerequisites:
#   - W3 local network running (make dev)
#   - W3_SECRET_ETHEREUM (bridge signer with USDC on Base)
#
# Valid commands: deposit, redeem, status

name: Vault E2E
on:
  workflow_dispatch: {}

jobs:
  # ── Read-only: status ──────────────────────────────────────────────
  reads:
    runs-on: ubuntu-latest
    steps:
      # status
      - uses: w3-io/w3-vault-action@master
        id: status
        env:
          W3_SECRET_ETHEREUM: ${{ secrets.W3_SECRET_ETHEREUM }}
        with:
          command: status
          environment: testing

      - run: |
          echo "=== Status ==="
          echo "${{ steps.status.outputs.result }}"

  # ── Write: deposit -> status -> redeem ─────────────────────────────
  deposit-redeem:
    runs-on: ubuntu-latest
    steps:
      # 1. Deposit 1.00 USDC
      - uses: w3-io/w3-vault-action@master
        id: deposit
        env:
          W3_SECRET_ETHEREUM: ${{ secrets.W3_SECRET_ETHEREUM }}
        bridge-allow:
          - ethereum/call-contract
        with:
          command: deposit
          amount: "1.00"
          po-id: "e2e-test-001"
          source-chain: base
          environment: testing

      # 2. Check status after deposit
      - uses: w3-io/w3-vault-action@master
        id: status-after
        env:
          W3_SECRET_ETHEREUM: ${{ secrets.W3_SECRET_ETHEREUM }}
        with:
          command: status
          environment: testing

      # 3. Recovery: redeem to return funds
      - uses: w3-io/w3-vault-action@master
        id: redeem
        env:
          W3_SECRET_ETHEREUM: ${{ secrets.W3_SECRET_ETHEREUM }}
        bridge-allow:
          - ethereum/call-contract
        with:
          command: redeem
          amount: "1.00"
          environment: testing

      - run: |
          echo "=== Deposit ==="
          echo "${{ steps.deposit.outputs.result }}"
          echo "=== Status After ==="
          echo "${{ steps.status-after.outputs.result }}"
          echo "=== Redeem ==="
          echo "${{ steps.redeem.outputs.result }}"
